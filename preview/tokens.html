<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1200" />
<title>Pi DS — Tokens Reference</title>
<link rel="stylesheet" href="/src/index.scss" />
<link rel="stylesheet" href="/assets/symicon.css" />
<style>
  body { margin: 0; padding: 40px 48px 80px; background: var(--bg-muted); color: var(--fg); }
  .wrap { max-width: 1280px; margin: 0 auto; }

  /* ---------- header ---------- */
  header { margin-bottom: 24px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
  header h1 { font-size: 40px; line-height: 48px; margin: 0 0 10px; letter-spacing: -0.01em; }
  header p { max-width: 720px; margin: 0; color: var(--fg-2); font-size: 15px; line-height: 26px; text-wrap: pretty; }

  /* ---------- search + tabs bar (sticky) ---------- */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg-muted);
    padding: 16px 0 14px;
    margin: 0 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .search {
    position: relative; flex: 1; min-width: 260px;
  }
  .search .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 18px; color: var(--fg-3); pointer-events: none;
  }
  .search input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 14px;
    font-family: inherit;
    color: var(--fg);
    outline: none;
    transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard);
  }
  .search input:focus { border-color: var(--cl-green-500); box-shadow: 0 0 0 3px rgba(0,170,144,.12); }
  .search input::placeholder { color: var(--fg-3); }

  .tabs { display: inline-flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .tab {
    padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 6px;
    background: transparent; border: 0; cursor: pointer; color: var(--fg-2);
    font-family: inherit;
  }
  .tab:hover { background: var(--bg-subtle); color: var(--fg); }
  .tab.is-active { background: var(--cl-basic-900); color: var(--cl-basic-0); }

  /* ---------- section ---------- */
  section { margin-bottom: 56px; scroll-margin-top: 90px; }
  section.is-hidden { display: none; }
  section > h2 {
    font-size: 20px; line-height: 28px; margin: 0 0 4px;
    display: flex; align-items: baseline; gap: 10px;
  }
  section > h2 .count { font-size: 12px; font-weight: 500; color: var(--fg-3); }
  section > .dek { font-size: 13px; line-height: 22px; color: var(--fg-3); margin: 0 0 20px; max-width: 720px; text-wrap: pretty; }

  /* ---------- grid of token rows ---------- */
  .token-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 8px;
    background: var(--surface);
    padding: 8px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }
  .token {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-standard);
    position: relative;
  }
  .token:hover { background: var(--bg-subtle); }
  .token.is-hidden { display: none; }

  /* swatch preview */
  .swatch {
    width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0;
    box-shadow: inset 0 0 0 1px var(--border);
    background-image:
      linear-gradient(45deg, #eee 25%, transparent 25%),
      linear-gradient(-45deg, #eee 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #eee 75%),
      linear-gradient(-45deg, transparent 75%, #eee 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    position: relative;
  }
  .swatch-fill { position: absolute; inset: 0; border-radius: 6px; }
  .swatch.is-dark-bg { background: var(--cl-basic-900); background-image: none; }

  /* info block */
  .token .info { flex: 1; min-width: 0; }
  .token .name {
    font-family: ui-monospace, SF Mono, Menlo, Consolas, monospace;
    font-size: 12px; font-weight: 600;
    color: var(--fg);
    display: flex; align-items: center; gap: 6px;
  }
  .token .meta {
    font-size: 11px; color: var(--fg-3);
    font-family: ui-monospace, SF Mono, Menlo, Consolas, monospace;
    margin-top: 2px;
    word-break: break-all;
  }

  .copied-hint {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px; font-weight: 600;
    background: var(--cl-green-500); color: var(--cl-basic-0);
    padding: 4px 8px; border-radius: 999px;
    opacity: 0; pointer-events: none;
    transition: opacity .18s var(--ease-standard);
  }
  .token.is-copied .copied-hint { opacity: 1; }
  .type-row.is-copied .copied-hint { opacity: 1; }

  /* spacing / radius / shadow visualisations */
  .spacing-vis, .radius-vis, .shadow-vis {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .spacing-bar {
    background: var(--cl-green-500);
    height: 10px; border-radius: 2px;
  }
  .radius-box {
    width: 32px; height: 32px;
    background: var(--cl-basic-900);
  }
  .shadow-box {
    width: 28px; height: 28px;
    background: var(--cl-basic-0);
    border-radius: 4px;
  }

  /* typography visualisations */
  .type-row {
    display: grid; grid-template-columns: 200px 1fr auto;
    gap: 20px; align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-standard);
    position: relative;
  }
  .type-row:hover { background: var(--bg-subtle); }
  .type-row.is-hidden { display: none; }
  .type-row .name {
    font-family: ui-monospace, monospace; font-size: 12px; font-weight: 600;
    color: var(--fg);
  }
  .type-row .name .meta {
    display: block; font-size: 10px; color: var(--fg-3); margin-top: 2px; font-weight: 400;
  }
  .type-row .preview { color: var(--fg); }
  .type-row .specs {
    font-size: 11px; color: var(--fg-3);
    font-family: ui-monospace, monospace;
    text-align: right;
    white-space: nowrap;
  }
  .type-list {
    background: var(--surface);
    padding: 8px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }

  /* no-results */
  .no-results {
    display: none;
    padding: 40px;
    text-align: center;
    color: var(--fg-3);
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }
  .no-results.is-show { display: block; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Pi Design System</div>
    <h1>Tokens Reference</h1>
    <p>色彩與字體 tokens 對照表。點一下任一 row 可複製變數名。切版時優先使用 SCSS 變數（$cl-xxx），語意層用 $fg / $bg / $border 等 alias。可用上方搜尋過濾。</p>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search">
      <i class="icon icon-search"></i>
      <input id="q" type="search" placeholder="搜尋 token（例：green、fg、#10、brand）" autocomplete="off" />
    </div>
    <div class="tabs" id="tabs">
      <button class="tab is-active" data-filter="all">All</button>
      <button class="tab" data-filter="color">Color</button>
      <button class="tab" data-filter="type">Type</button>
    </div>
    <div style="font-size: 12px; color: var(--fg-3);">
      <kbd style="font-family: ui-monospace, monospace; background: var(--surface); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);">/</kbd> 搜尋 ·
      <kbd style="font-family: ui-monospace, monospace; background: var(--surface); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);">Click</kbd> 複製
    </div>
  </div>

  <div class="no-results" id="noResults">
    <i class="icon icon-search" style="font-size: 24px; color: var(--fg-4);"></i>
    <div style="margin-top: 8px;">沒有符合的 token</div>
  </div>

  <!-- Sections are rendered dynamically below -->
  <div id="sections"></div>

</div>

<script>
// ============================================================
// Token data
// ============================================================

const ALL_COLOR_FAMILIES = [
  { family: "basic", note: "Neutral（warm-cool grey）— 文字、邊框、背景" },
  { family: "green", note: "成功、CTA，產品主色" },
  { family: "blue", note: "資訊、連結（資料密集情境）" },
  { family: "yellow", note: "警示、soft confirmation" },
  { family: "red", note: "錯誤、刪除、負面" },
  { family: "orange", note: "VIP / 付費會員（不要當一般 accent）" },
  { family: "purple", note: "AI / 智慧推薦（不要當一般 accent）" },
];

const COLOR_RAMP_STEPS = [0, 50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000];

const COLORS = [];
ALL_COLOR_FAMILIES.forEach(f => {
  COLOR_RAMP_STEPS.forEach(step => {
    // Probe whether this token actually exists in :root
    const key = `--cl-${f.family}-${step}`;
    const val = getComputedStyle(document.documentElement).getPropertyValue(key).trim();
    if (val) COLORS.push({
      name: `${f.family}-${step}`,
      cssVar: key,
      scssVar: `$cl-${f.family}-${step}`,
      hex: val,
      family: f.family,
      note: step === 500 ? f.note : "",
    });
  });
});

// Alpha / overlay tokens
const ALPHA = [
  "basic-alpha-50", "basic-alpha-100", "basic-alpha-200", "basic-alpha-300", "basic-alpha-400",
  "basic-alpha-500", "basic-alpha-600", "basic-alpha-700", "basic-alpha-800", "basic-alpha-900",
  "light-100", "light-200", "light-300", "light-400", "light-500",
  "dark-100", "dark-200", "dark-300", "dark-400", "dark-500",
  "white-alpha-50", "white-alpha-100", "white-alpha-200", "white-alpha-300", "white-alpha-400",
  "white-alpha-500", "white-alpha-600", "white-alpha-700", "white-alpha-800", "white-alpha-900",
].map(n => {
  const key = `--cl-${n}`;
  const val = getComputedStyle(document.documentElement).getPropertyValue(key).trim();
  return { name: n, cssVar: key, scssVar: `$cl-${n}`, hex: val, family: "alpha", note: "" };
}).filter(c => c.hex);

// Semantic aliases
const SEMANTIC = [
  { name: "bg",             role: "頁面預設背景",               cssVar: "--bg",             scssVar: "$bg" },
  { name: "bg-muted",       role: "輕微對比的背景（灰底分區）", cssVar: "--bg-muted",       scssVar: "$bg-muted" },
  { name: "bg-subtle",      role: "更淺的分區背景",             cssVar: "--bg-subtle",      scssVar: "$bg-subtle" },
  { name: "surface",        role: "卡片、浮出內容表面",          cssVar: "--surface",        scssVar: "$surface" },
  { name: "surface-raised", role: "懸浮層（modal、popover）",    cssVar: "--surface-raised", scssVar: "$surface-raised" },
  { name: "surface-sunken", role: "內凹區域（input 底）",         cssVar: "--surface-sunken", scssVar: "$surface-sunken" },
  { name: "fg",             role: "主要文字",                   cssVar: "--fg",             scssVar: "$fg" },
  { name: "fg-2",           role: "次要文字、body",             cssVar: "--fg-2",           scssVar: "$fg-2" },
  { name: "fg-3",           role: "三級文字、placeholder",      cssVar: "--fg-3",           scssVar: "$fg-3" },
  { name: "fg-4",           role: "disabled 文字",              cssVar: "--fg-4",           scssVar: "$fg-4" },
  { name: "fg-inverse",     role: "反色文字（深底白字）",        cssVar: "--fg-inverse",     scssVar: "$fg-inverse" },
  { name: "border",         role: "預設邊框",                   cssVar: "--border",         scssVar: "$border" },
  { name: "border-strong",  role: "強調邊框",                   cssVar: "--border-strong",  scssVar: "$border-strong" },
  { name: "link",           role: "超連結",                     cssVar: "--link",           scssVar: "$link" },
  { name: "link-hover",     role: "超連結 hover",               cssVar: "--link-hover",     scssVar: "$link-hover" },
  { name: "brand",          role: "品牌主色（CTA）",            cssVar: "--brand",          scssVar: "$brand" },
  { name: "brand-hover",    role: "品牌主色 hover",             cssVar: "--brand-hover",    scssVar: "$brand-hover" },
  { name: "brand-soft",     role: "品牌背景（淡）",             cssVar: "--brand-soft",     scssVar: "$brand-soft" },
].map(s => ({ ...s, family: "semantic", hex: getComputedStyle(document.documentElement).getPropertyValue(s.cssVar).trim() }));

// Typography classes
const TYPE = [
  // headline
  { name: "fz-headline-xxl", size: 48, lh: 72, w: 700, note: "Hero title — 品牌主視覺" },
  { name: "fz-headline-xl",  size: 40, lh: 60, w: 700, note: "頁面主標" },
  { name: "fz-headline-lg",  size: 32, lh: 48, w: 700, note: "section lead" },
  { name: "fz-headline-md",  size: 28, lh: 42, w: 700, note: "" },
  { name: "fz-headline-sm",  size: 24, lh: 36, w: 700, note: "" },
  { name: "fz-headline-xs",  size: 20, lh: 30, w: 700, note: "" },
  // title
  { name: "fz-title-lg", size: 18, lh: 28, w: 600, note: "卡片主標" },
  { name: "fz-title-md", size: 16, lh: 24, w: 600, note: "表單 label、inline 強調" },
  { name: "fz-title-sm", size: 14, lh: 20, w: 600, note: "" },
  // body
  { name: "fz-body-lg", size: 18, lh: 32, w: 400, note: "長文閱讀" },
  { name: "fz-body-md", size: 16, lh: 28, w: 400, note: "預設內文" },
  { name: "fz-body-sm", size: 14, lh: 24, w: 400, note: "密集資訊" },
  { name: "fz-body-xs", size: 12, lh: 20, w: 400, note: "時間戳、metadata" },
].map(t => ({ ...t, family: "type", cssClass: t.name }));

// Spacing
const SPACING = [
  { name: "sp-1",  px: 4 },
  { name: "sp-2",  px: 8 },
  { name: "sp-3",  px: 12 },
  { name: "sp-4",  px: 16, note: "預設 padding / gap" },
  { name: "sp-5",  px: 20 },
  { name: "sp-6",  px: 24, note: "section 間距" },
  { name: "sp-8",  px: 32 },
  { name: "sp-10", px: 40 },
  { name: "sp-12", px: 48 },
  { name: "sp-16", px: 64 },
].map(s => ({ ...s, family: "spacing", cssVar: `--${s.name}`, scssVar: `$${s.name}` }));

// Radius
const RADIUS = [
  { name: "radius-xs",   px: 2,   note: "sub-component、tag 邊角" },
  { name: "radius-sm",   px: 8,   note: "input、小按鈕" },
  { name: "radius-md",   px: 12,  note: "⭐ 預設卡片 / 按鈕" },
  { name: "radius-lg",   px: 16,  note: "feature card、modal" },
  { name: "radius-xl",   px: 24,  note: "hero tile、marketing" },
  { name: "radius-pill", px: 999, note: "filter chip、avatar、pill" },
].map(r => ({ ...r, family: "radius", cssVar: `--${r.name}`, scssVar: `$${r.name}` }));

// Shadow
const SHADOW = [
  { name: "shadow-xs",   note: "極輕微抬起" },
  { name: "shadow-sm",   note: "⭐ 卡片預設" },
  { name: "shadow-md",   note: "hover 抬起" },
  { name: "shadow-lg",   note: "重要浮出內容" },
  { name: "shadow-xl",   note: "modal" },
  { name: "shadow-xxl",  note: "遮罩上的主畫面" },
].map(s => ({ ...s, family: "shadow", cssVar: `--${s.name}`, scssVar: `$${s.name}` }));

// Motion
const MOTION = [
  { name: "dur-fast",  value: "120ms", note: "state change（hover、focus）" },
  { name: "dur-base",  value: "200ms", note: "view transition" },
  { name: "dur-slow",  value: "320ms", note: "sheet / modal" },
  { name: "ease-standard",   value: "cubic-bezier(.2, 0, 0, 1)", note: "預設（decelerate）" },
  { name: "ease-emphasized", value: "cubic-bezier(.3, 0, 0, 1)", note: "強調動線" },
].map(m => ({ ...m, family: "motion", cssVar: `--${m.name}`, scssVar: `$${m.name}` }));

// ============================================================
// Render
// ============================================================

function el(tag, cls, html) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html != null) n.innerHTML = html;
  return n;
}

function renderColorToken(c) {
  const row = el("div", "token");
  row.dataset.search = `${c.name} ${c.scssVar} ${c.cssVar} ${c.hex} ${c.family} ${c.note||""} ${c.role||""}`.toLowerCase();
  row.dataset.family = c.family === "alpha" ? "color" : "color";
  row.dataset.copy = c.scssVar;

  // swatch
  const sw = el("div", "swatch");
  const fill = el("div", "swatch-fill");
  fill.style.background = c.hex;
  sw.appendChild(fill);
  row.appendChild(sw);

  // info
  const info = el("div", "info");
  info.appendChild(el("div", "name", c.scssVar));
  info.appendChild(el("div", "meta", `${c.cssVar} · ${c.hex}${c.note ? " · " + c.note : ""}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderSemanticToken(s) {
  const row = el("div", "token");
  row.dataset.search = `${s.name} ${s.scssVar} ${s.cssVar} ${s.role} semantic`.toLowerCase();
  row.dataset.family = "semantic";
  row.dataset.copy = s.scssVar;

  const sw = el("div", "swatch");
  const fill = el("div", "swatch-fill");
  fill.style.background = `var(${s.cssVar})`;
  sw.appendChild(fill);
  row.appendChild(sw);

  const info = el("div", "info");
  info.appendChild(el("div", "name", s.scssVar));
  info.appendChild(el("div", "meta", `${s.cssVar} · ${s.role}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderTypeToken(t) {
  const row = el("div", "type-row");
  row.dataset.search = `${t.name} ${t.cssClass} type font ${t.note}`.toLowerCase();
  row.dataset.family = "type";
  row.dataset.copy = `.${t.cssClass}`;

  const name = el("div", "name", `.${t.cssClass}<span class="meta">${t.note || ""}</span>`);
  const preview = el("div", `preview ${t.cssClass}`, "中文職涯 Aa 薪資 · Apr 2026");
  const specs = el("div", "specs", `${t.size} / ${t.lh} · ${t.w}`);

  row.appendChild(name);
  row.appendChild(preview);
  row.appendChild(specs);
  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderSpacingToken(s) {
  const row = el("div", "token");
  row.dataset.search = `${s.name} ${s.scssVar} ${s.cssVar} spacing ${s.px}px ${s.note||""}`.toLowerCase();
  row.dataset.family = "spacing";
  row.dataset.copy = s.scssVar;

  const vis = el("div", "spacing-vis");
  const bar = el("div", "spacing-bar");
  bar.style.width = Math.min(s.px, 64) + "px";
  vis.appendChild(bar);
  row.appendChild(vis);

  const info = el("div", "info");
  info.appendChild(el("div", "name", s.scssVar));
  info.appendChild(el("div", "meta", `${s.px}px · ${s.cssVar}${s.note ? " · " + s.note : ""}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderRadiusToken(r) {
  const row = el("div", "token");
  row.dataset.search = `${r.name} ${r.scssVar} radius ${r.px}px ${r.note||""}`.toLowerCase();
  row.dataset.family = "radius";
  row.dataset.copy = r.scssVar;

  const vis = el("div", "radius-vis");
  const box = el("div", "radius-box");
  box.style.borderRadius = (r.px >= 100 ? 999 : r.px) + "px";
  vis.appendChild(box);
  row.appendChild(vis);

  const info = el("div", "info");
  info.appendChild(el("div", "name", r.scssVar));
  info.appendChild(el("div", "meta", `${r.px === 999 ? "pill (999px)" : r.px + "px"} · ${r.cssVar}${r.note ? " · " + r.note : ""}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderShadowToken(s) {
  const row = el("div", "token");
  row.dataset.search = `${s.name} ${s.scssVar} shadow ${s.note||""}`.toLowerCase();
  row.dataset.family = "shadow";
  row.dataset.copy = s.scssVar;

  const vis = el("div", "shadow-vis");
  const box = el("div", "shadow-box");
  box.style.boxShadow = `var(${s.cssVar})`;
  vis.appendChild(box);
  row.appendChild(vis);

  const info = el("div", "info");
  info.appendChild(el("div", "name", s.scssVar));
  info.appendChild(el("div", "meta", `${s.cssVar}${s.note ? " · " + s.note : ""}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderMotionToken(m) {
  const row = el("div", "token");
  row.dataset.search = `${m.name} ${m.scssVar} motion ${m.value} ${m.note||""}`.toLowerCase();
  row.dataset.family = "motion";
  row.dataset.copy = m.scssVar;

  const vis = el("div", "spacing-vis");
  vis.innerHTML = `<i class="icon icon-_loading" style="font-size: 18px; color: var(--cl-green-500); animation: gl_rotate 2.5s linear infinite;"></i>`;
  row.appendChild(vis);

  const info = el("div", "info");
  info.appendChild(el("div", "name", m.scssVar));
  info.appendChild(el("div", "meta", `${m.value} · ${m.note}`));
  row.appendChild(info);

  row.appendChild(el("div", "copied-hint", "copied ✓"));
  return row;
}

function renderSection({ title, dek, family, items, renderItem, layout = "grid" }) {
  const s = el("section");
  s.dataset.family = family;
  const h = el("h2", null, `${title} <span class="count">${items.length}</span>`);
  s.appendChild(h);
  if (dek) s.appendChild(el("p", "dek", dek));

  const container = el("div", layout === "list" ? "type-list" : "token-grid");
  items.forEach(it => container.appendChild(renderItem(it)));
  s.appendChild(container);

  return s;
}

// ---- Render all sections ----
const root = document.getElementById("sections");

// Split color families into separate sections so they're easier to scan
ALL_COLOR_FAMILIES.forEach(f => {
  const items = COLORS.filter(c => c.family === f.family);
  if (items.length === 0) return;
  root.appendChild(renderSection({
    title: f.family.charAt(0).toUpperCase() + f.family.slice(1),
    dek: "",
    family: "color",
    items,
    renderItem: renderColorToken,
  }));
});

root.appendChild(renderSection({
  title: "Alpha / Overlay",
  dek: "用於疊加在圖片、彩色 background 上的半透明色。",
  family: "color",
  items: ALPHA,
  renderItem: renderColorToken,
}));

root.appendChild(renderSection({
  title: "Typography",
  dek: "三組 scale：Headline（大標）、Title（小標）、Body（內文）。Legacy h1-h4 / s1-s4 / t1-t4 保留但不要在新程式碼使用。",
  family: "type",
  items: TYPE,
  renderItem: renderTypeToken,
  layout: "list",
}));

// ============================================================
// Interactions: click to copy, search, tab filter, `/` shortcut
// ============================================================

// Click → copy  (fallback to execCommand when clipboard API is blocked in iframes)
function copyText(text) {
  // Modern path
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return fallbackCopy(text);
}
function fallbackCopy(text) {
  return new Promise((resolve, reject) => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      ok ? resolve() : reject(new Error("execCommand failed"));
    } catch (err) {
      document.body.removeChild(ta);
      reject(err);
    }
  });
}

document.addEventListener("click", e => {
  const row = e.target.closest("[data-copy]");
  if (!row) return;
  const text = row.dataset.copy;
  copyText(text).then(() => {
    row.classList.add("is-copied");
    setTimeout(() => row.classList.remove("is-copied"), 1100);
  }).catch(err => {
    console.warn("copy failed", err);
    const hint = row.querySelector(".copied-hint");
    if (hint) {
      hint.textContent = "copy failed";
      hint.style.background = "var(--cl-red-500)";
    }
    row.classList.add("is-copied");
    setTimeout(() => {
      row.classList.remove("is-copied");
      if (hint) { hint.textContent = "copied ✓"; hint.style.background = ""; }
    }, 1400);
  });
});

// Search + tab filter
const input = document.getElementById("q");
const tabs = document.getElementById("tabs");
let activeFilter = "all";

function applyFilter() {
  const q = input.value.trim().toLowerCase();
  const sections = document.querySelectorAll("#sections section");
  let anyVisible = false;

  sections.forEach(sec => {
    const family = sec.dataset.family;
    // tab filter
    if (activeFilter !== "all" && family !== activeFilter) {
      sec.classList.add("is-hidden");
      return;
    }

    // apply search to each token
    const rows = sec.querySelectorAll("[data-search]");
    let visibleInSection = 0;
    rows.forEach(r => {
      const match = !q || r.dataset.search.includes(q);
      r.classList.toggle("is-hidden", !match);
      if (match) visibleInSection++;
    });

    // update count
    const countEl = sec.querySelector("h2 .count");
    if (countEl) countEl.textContent = visibleInSection;

    sec.classList.toggle("is-hidden", visibleInSection === 0);
    if (visibleInSection > 0) anyVisible = true;
  });

  document.getElementById("noResults").classList.toggle("is-show", !anyVisible);
}

input.addEventListener("input", applyFilter);
tabs.addEventListener("click", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  tabs.querySelectorAll(".tab").forEach(t => t.classList.remove("is-active"));
  tab.classList.add("is-active");
  activeFilter = tab.dataset.filter;
  applyFilter();
});

// Keyboard: `/` to focus search, `Esc` to clear
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== input) {
    e.preventDefault();
    input.focus();
    input.select();
  }
  if (e.key === "Escape" && document.activeElement === input) {
    input.value = "";
    applyFilter();
    input.blur();
  }
});
</script>
