<!doctype html>
<!-- @dsCard group="Colors" name="Color" subtitle="Tonal ramps, alpha overlays" viewport="1200x2400" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1200" />
<title>Pi DS — Color</title>
<link rel="stylesheet" href="/src/index.scss" />
<link rel="stylesheet" href="/preview/preview.scss" />
<style>
  .ramp { display: block; }
  .ramp .label { margin-bottom: var(--sp-2); }
  .ramp .label .name { margin-bottom: 0; }
  .color-swatches-stack { display: grid; gap: var(--sp-1); }
  .color-swatches { display: grid; grid-template-columns: repeat(10, 1fr); gap: var(--sp-1); }
  .color-swatch { aspect-ratio: 1/1; padding: var(--sp-2); display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; position: relative; border-radius: var(--radius-md); overflow: hidden; }
  .color-swatch-step { opacity: .9; }
  .color-swatch-meta { display: grid; gap: 2px; margin-top: auto; font-size: 10px; line-height: 12px; }
  .color-swatch-var,
  .color-swatch-value { font-family: ui-monospace, SF Mono, Menlo, monospace; word-break: break-all; }
  .color-swatch-var { opacity: .85; }
  .color-swatch-value { opacity: .6; }
  .color-swatch.is-dark { color: var(--cl-light-500); }
  .color-swatch.is-light { color: var(--cl-dark-400); }
  .color-swatch.is-low-contrast { color: var(--cl-basic-alpha-700); }
  .color-swatch.is-low-contrast .color-swatch-var,
  .color-swatch.is-low-contrast .color-swatch-value { color: var(--cl-basic-alpha-500); opacity: 1; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--cl-basic-900); color: var(--cl-basic-0);
    padding: 12px 20px; border-radius: 999px;
    box-shadow: var(--shadow-xl);
    opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s;
    z-index: 100; display: flex; align-items: center; gap: 8px;
    font-family: ui-monospace, SF Mono, Menlo, monospace;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .color-preview-stack { display: grid; gap: var(--sp-6); padding: 0; }
  .color-preview-label { margin-bottom: var(--sp-2); }
  header .eyebrow,
  header h1 { margin-bottom: var(--sp-1); }
  .color-swatch.is-alpha {
    color: var(--cl-dark-400);
    background:
      linear-gradient(var(--alpha-fill), var(--alpha-fill)),
      linear-gradient(var(--cl-basic-0), var(--cl-basic-0)),
      linear-gradient(45deg, var(--cl-basic-100) 25%, transparent 25%),
      linear-gradient(-45deg, var(--cl-basic-100) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--cl-basic-100) 75%),
      linear-gradient(-45deg, transparent 75%, var(--cl-basic-100) 75%);
    background-size:
      auto,
      auto,
      var(--sp-4) var(--sp-4),
      var(--sp-4) var(--sp-4),
      var(--sp-4) var(--sp-4),
      var(--sp-4) var(--sp-4);
    background-position:
      0 0,
      0 0,
      0 0,
      0 var(--sp-2),
      var(--sp-2) calc(-1 * var(--sp-2)),
      calc(-1 * var(--sp-2)) 0;
  }
  .color-swatch.is-alpha-on-dark {
    color: var(--cl-light-500);
    background:
      linear-gradient(var(--alpha-fill), var(--alpha-fill)),
      linear-gradient(var(--cl-basic-1000), var(--cl-basic-1000));
    background-size: auto;
    background-position: 0 0;
  }
  .color-swatch.is-alpha-text-light { color: var(--cl-light-500); }
  .color-swatch.is-alpha-text-dark { color: var(--cl-dark-500); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow fz-title-xs text-basic-alpha-500">Foundation</div>
    <h1 class="fz-headline-xl text-basic-alpha-900">色彩 Color</h1>
    <p class="fz-body-md text-basic-alpha-700">點擊任一色塊可複製其 SCSS 變數（如 <code>$cl-blue-400</code>）。</p>
  </header>

  <section>
    <h2 class="fz-headline-xs">General</h2>
    <div class="color-preview-stack" id="ramps"></div>
  </section>

  <section>
    <h2 class="fz-headline-xs">透明色 Alpha overlays</h2>
    <div class="color-preview-stack">
      <div>
        <div class="color-preview-label fz-title-xs">Basic alpha（深色疊淺底）</div>
        <div class="color-swatches" id="basic-alpha"></div>
      </div>
      <div>
        <div class="color-preview-label fz-title-xs">White alpha（淺色疊深底）</div>
        <div class="color-swatches" id="white-alpha"></div>
      </div>
    </div>
  </section>
</div>

<div class="toast fz-body-xs" id="toast" role="status" aria-live="polite"></div>

<script>
  const ramps = [
    ['basic',   'Basic'],
    ['red',     'Red'],
    ['orange',  'Orange'],
    ['yellow',  'Yellow'],
    ['green',   'Green'],
    ['blue',    'Blue'],
    ['purple',  'Purple'],
  ];
  const rampsEl = document.getElementById('ramps');
  ramps.forEach(([key, name]) => {
    const row = document.createElement('div');
    row.className = 'ramp';
    const rampSteps = [50,100,200,300,400,500,600,700,800,900];
    const makeSwatch = (s) => {
      const varname = `--cl-${key}-${s}`;
      const scssVar = `$cl-${key}-${s}`;
      const label = key === 'basic' ? (s === 0 ? '0 (White)' : String(s)) : String(s);
      const toneClass = s >= 500 ? 'is-dark' : 'is-light';
      const contrastClass = s <= 100 ? 'is-low-contrast' : '';
      return `<div class="color-swatch gl_border-inner ${toneClass} ${contrastClass}" style="background: var(${varname});" data-copy="${scssVar}" title="點擊複製 ${scssVar}"><span class="color-swatch-step fz-title-xs">${label}</span><span class="color-swatch-meta"><span class="color-swatch-var">${scssVar}</span><span class="color-swatch-value" data-var="${varname}"></span></span></div>`;
    };
    const swatches = rampSteps.map(makeSwatch).join('');
    const basicEnds = [0,1000].map(makeSwatch).join('');
    row.innerHTML = `
      <div class="label"><div class="name fz-title-xs">${name}</div></div>
      <div class="color-swatches-stack">
        <div class="color-swatches">${swatches}</div>
        ${key === 'basic' ? `<div class="color-swatches">${basicEnds}</div>` : ''}
      </div>
    `;
    rampsEl.appendChild(row);
  });
  function colorValueToHex(value) {
    const text = value.trim();
    if (!text.startsWith('rgb')) return text.toUpperCase();

    const hasAlpha = text.startsWith('rgba');
    const parts = text
      .replace(/^rgba?\(/, '')
      .replace(/\)$/, '')
      .replace(/\s*\/\s*/, ',')
      .split(/[\s,]+/)
      .filter(Boolean);

    const [r, g, b] = parts.slice(0, 3).map((part) => Number(part));
    const alpha = parts[3] === undefined ? 1 : Number(parts[3]);
    if ([r, g, b, alpha].some((n) => Number.isNaN(n))) return text.toUpperCase();

    const toHex = (n) => Math.round(Math.max(0, Math.min(255, n))).toString(16).padStart(2, '0');
    const alphaHex = hasAlpha ? toHex(alpha <= 1 ? alpha * 255 : alpha) : '';
    return `#${toHex(r)}${toHex(g)}${toHex(b)}${alphaHex}`.toUpperCase();
  }

  function fillComputedColorLabels() {
    document.querySelectorAll('[data-var]').forEach(el => {
      const v = getComputedStyle(document.documentElement).getPropertyValue(el.dataset.var).trim();
      el.textContent = colorValueToHex(v);
    });
  }

  // ---- 點擊色塊複製 SCSS 變數 ----
  const toast = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = '已複製  ' + msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }
  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => showToast(text)).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast(text); } catch (e) {}
    document.body.removeChild(ta);
  }
  document.addEventListener('click', (e) => {
    const sw = e.target.closest('[data-copy]');
    if (!sw) return;
    copyText(sw.dataset.copy);
  });

  // alpha rows — 顯示變數名 + 點擊複製
  const basicAlpha = document.getElementById('basic-alpha');
  [50,100,200,300,400,500,600,700,800,900].forEach(n => {
    const c = document.createElement('div');
    c.className = `color-swatch is-alpha ${n >= 500 ? 'is-alpha-text-light' : ''} gl_border-inner`;
    const scssVar = `$cl-basic-alpha-${n}`;
    c.style.setProperty('--alpha-fill', `var(--cl-basic-alpha-${n})`);
    c.dataset.copy = scssVar;
    c.title = `點擊複製 ${scssVar}`;
    c.innerHTML = `<span class="color-swatch-step fz-title-xs">${n}</span><span class="color-swatch-meta"><span class="color-swatch-var">${scssVar}</span><span class="color-swatch-value" data-var="--cl-basic-alpha-${n}"></span></span>`;
    basicAlpha.appendChild(c);
  });
  const whiteAlpha = document.getElementById('white-alpha');
  [50,100,200,300,400,500,600,700,800,900].forEach(n => {
    const c = document.createElement('div');
    c.className = `color-swatch is-alpha is-alpha-on-dark ${n >= 500 ? 'is-alpha-text-dark' : ''} gl_border-inner`;
    const scssVar = `$cl-white-alpha-${n}`;
    c.style.setProperty('--alpha-fill', `var(--cl-white-alpha-${n})`);
    c.dataset.copy = scssVar;
    c.title = `點擊複製 ${scssVar}`;
    c.innerHTML = `<span class="color-swatch-step fz-title-xs">${n}</span><span class="color-swatch-meta"><span class="color-swatch-var">${scssVar}</span><span class="color-swatch-value" data-var="--cl-white-alpha-${n}"></span></span>`;
    whiteAlpha.appendChild(c);
  });
  requestAnimationFrame(fillComputedColorLabels);
</script>
</body>
</html>
